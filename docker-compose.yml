version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - '8123:8123'
      - '9000:9000'
    environment:
      CLICKHOUSE_DB: threat_db
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: password123

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: vectordb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    
    api:
    build: ./backend
    ports:
      - '8000:8000'
    depends_on:
      - redis
      - clickhouse
      - postgres

  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - '3000:3000'
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api